<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Lesson Content</h1>
    <div id="content-display">
        <p>This is the lesson content that will be displayed.</p>
    </div>

    <h2>Edit Lesson</h2>
    <textarea id="content-edit" rows="10" cols="50">This is the lesson content that will be displayed.</textarea>
    <br>
    <button id="save-content">Save</button>

    <script>
        document.getElementById('save-content').onclick = function() {
            const newContent = document.getElementById('content-edit').value;
            document.getElementById('content-display').innerHTML = newContent;
            alert('Content saved!');
        };
    </script>
</body>
</html>
