<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Display</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quiz-container">
        <h1>Quiz Title</h1>
        <div class="question">
            <p>Question 1: What is the capital of France?</p>
            <ul>
                <li><input type="radio" name="q1" value="a"> Paris</li>
                <li><input type="radio" name="q1" value="b"> London</li>
                <li><input type="radio" name="q1" value="c"> Berlin</li>
                <li><input type="radio" name="q1" value="d"> Madrid</li>
            </ul>
        </div>
        <button id="submit">Submit</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
